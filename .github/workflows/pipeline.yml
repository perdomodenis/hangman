name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - staging
      - master

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dependencies installieren
        run: npm ci

      - name: Lint ausführen
        run: CI=false npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dependencies installieren
        run: npm ci

      - name: Tests ausführen
        run: npm test -- --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dependencies installieren
        run: npm ci

      - name: Build erstellen
        run: CI=false npm run build

  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Deploy nach Dev
        env:
          APP_ENV: dev
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: echo "Deploy to dev with $APP_ENV"

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Deploy nach Staging
        env:
          APP_ENV: staging
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: echo "Deploy to staging with $APP_ENV"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Deploy nach Production
        env:
          APP_ENV: production
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: echo "Deploy to production with $APP_ENV"
        //
        //
